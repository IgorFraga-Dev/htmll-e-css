<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>formulario</title>
</head>
<body>
    <h1>Meu primeiro formulário</h1>
    <form action="" method="get" autocomplete="on">
     <p>
        <label for="nome">nome</label>
        <input type="text" name="nome" id="nome" required maxlength="30" placeholder="nome completo" autocomplete="username">
     </p>
     <p>
        <label for="media">media</label>
        <input type="number" name="media" id="media" required min="6" max="10" step="0.1" value="5">
     </p>
  <p>
    <label for="mes">periodo letivo</label>
    <input type="month" name="mes" id="mes">
  </p>
  <p>
    <label for="dia">Dia da Prova</label>
    <input type="date" name="prova" id="dia" required >
  </p>
  <p>
    <label for="hora">hora da Prova</label>
    <input type="time" name="Prova" id="hora" required>
  </p>
     <p>
        <input type="submit" value="Enviar">
        <input type="submit" value="limpar">
     </p>
    </form>
</body>
</html>
