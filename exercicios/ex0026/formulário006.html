<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>formulário</title>
</head>
<body>
    <h1>Exemplo de formulário</h1>
    <form action="" method="post" autocomplete="on">
     <p>
        <label for="cor">cor</label>
        <input type="color" name="cores" id="or" value="#F8FAFC">
     </p>
     <p>
        <label for="satisfação">Nivel de satisfação</label>
            <input type="range" name="Niveis de satisfação" id="satisfação" min="1" max="5" value="3">
     </p>
     <p>
        <label for="foto">Foto do Perfil</label>
        <input type="file" name="Foto do Perfil" id="foto">
     </p>
    </form>
</body>
</html>
