<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tabelas</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }
        caption {
            font-family: Arial, Helvetica, sans-serif;
            font-size: 20px;
            text-align: center;
            width: 100px;
            padding: 10px;
            border: 2px solid black ;
            color: white;
            background-color: dimgrey;
        }
        table {
            width: 500px;
            border-collapse: collapse;
        }
        th {
            font-family: Arial, Helvetica, sans-serif;
            font-size: 20px;
            text-align: center;
            width: 50px;
            padding: 20px;
            border: 2px solid black ;
            color: white;
            background-color: dimgrey;
        }
        td {
            font-family: Arial, Helvetica, sans-serif;
            font-size: 15px;
            text-align: center;
            width: 30px;
            padding: 10px;
            border: 1px solid black ;
        }
        .cnome {
            background-color: aqua;
        }
        .csexo {
            background-color: yellow;
        }
    </style>
</head>
<body>
    <h1>Exercicios de tabela</h1>
    <table>
        <colgroup> 
        <col class="cnome">
        <col class="csexo">
        <col class="cidade">
        <col class="cprof">
        </colgroup>
        <caption>Cadastro</caption>
        <tr>
            <th scope="col">nome</th>
            <th scope="col">Sexo</th>
            <th scope="col">idade</th>
            <th scope="col" colspan="">profissão</th>
        </tr>
        <tr>
            <td>Ana Maria</td>
            <td>F</td>
            <td>25</td>
            <td>Jornalista</td>
        </tr>
        <tr>
            <td>Maria</td>
            <td>F</td>
            <td>22</td>
            <td>Empresária</td>
        </tr>
        <tr>
            <td>Lucas</td>
            <td>M</td>
            <td>29</td>
            <td>Jogador de Futebol</td>
        </tr>
        <tr>
            <td>Fernando</td>
            <td>M</td>
            <td>22</td>
            <td>Advogado</td>
        </tr>
        <tr>
            <td>Paula</td>
            <td>F</td>
            <td>29</td>
            <td>Médica</td>
        </tr>
        <tr>
            <td>Cecilia</td>
            <td>F</td>
            <td>35</td>
            <td>Programadora</td>
        </tr>
    </table>
</body>
</html>
